<!doctype html>
<html>
  <head>
    <title>Admin Login</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <style>
      body {
        /* This points to your uploaded image file in the static folder */
        background-image: url("{{ url_for('static', filename='Graphic.webp') }}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Admin Login</h2>

      <form method="POST">
        <input
          type="text"
          name="username"
          placeholder="Admin Username"
          required
        />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit" class="primary-btn">Login</button>
      </form>
      <a href="/admin_register">Register here</a>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
