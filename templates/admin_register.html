<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Register</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <style>
      /* only minimal styling if not already present */

      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
      }

      .form-box {
        background: white;
        padding: 35px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .form-box h2 {
        text-align: center;
        margin-bottom: 25px;
      }

      .input-group {
        margin-bottom: 18px;
      }

      .input-group label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }

      .input-group input {
        width: 100%;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid #ccc;
      }

      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #4facfe;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #00c6ff;
      }

      .link {
        text-align: center;
        margin-top: 15px;
      }

      .link a {
        color: #4facfe;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <div class="form-box">
      <h2>Admin Registration</h2>

      <form method="POST">
        <div class="input-group">
          <label>Name</label>
          <input
            type="text"
            name="name"
            placeholder="Enter your name"
            required
          />
        </div>

        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
          />
        </div>
        <div class="input-group">
          <label>Section</label>
          <input
            type="text"
            name="section"
            placeholder="Enter section"
            required
          />
        </div>

        <button type="submit">Register</button>
      </form>

      <div class="link">
        Already have account?
        <a href="/admin">Login here</a>
      </div>
    </div>
  </body>
</html>
