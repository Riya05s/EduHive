<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="login-body">

<div class="login-box">

    <h2 class="login-title"> Create Account</h2>
    <p class="subtitle">Join the MOOCs Management System</p>

    <form method="POST">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="email" name="email" placeholder="Email Address" required>
        <input type="password" name="password" minlength="6" placeholder="Password" required>
        <input type="text" name="section" placeholder="Section (A/B/C)" required>

        <button type="submit" class="primary-btn"> Register</button>
    </form>

    <div class="divider"></div>

    <a href="/student_login">
        <button class="secondary-btn outline"> Already have an account? Login</button>
    </a>

</div>

</body>
</html>
