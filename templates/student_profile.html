<!DOCTYPE html>
<html>
<head>
    <title>Student Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Extra inline styles specific to the profile page for a clean look */
        .stats-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            flex: 1;
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border-bottom: 4px solid #2563eb;
        }
        .stat-card h3 {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .stat-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #1e293b;
        }
        .profile-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-weight: 500;
            color: #334155;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .full-width {
            grid-column: span 2;
        }
    </style>
</head>

<body>
<div class="layout">

    <div class="sidebar">
        <h2> Student</h2>
        <a href="/student_dashboard"> Dashboard</a>
        <a href="/student_profile" style="background: rgba(255,255,255,0.2);"> Profile</a>
        <a href="/logout"> Logout</a>
    </div>

    <div class="main">
        <div class="topbar">
            <h2>My Profile</h2>
        </div>

        {% if success_msg %}
        <div style="background-color: #dcfce7; color: #16a34a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #bbf7d0;">
            <strong>Success:</strong> {{ success_msg }}
        </div>
        {% endif %}

        <div class="stats-container">
            <div class="stat-card">
                <h3>Total Enrolled Courses</h3>
                <div class="value">{{ stats.total_courses }}</div>
            </div>
            <div class="stat-card" style="border-bottom-color: #16a34a;">
                <h3>Approved Courses</h3>
                <div class="value">{{ stats.approved_courses }}</div>
            </div>
            <div class="stat-card" style="border-bottom-color: #f59e0b;">
                <h3>Total Marks Earned</h3>
                <div class="value">{{ stats.total_marks }}</div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">Edit Personal Details</h3>
            <form method="POST">
                <div class="profile-form-grid">
                    
                    <div class="form-group full-width">
                        <label>Full Name</label>
                        <input type="text" name="name" value="{{ student['name'] }}" required>
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" value="{{ student['email'] }}" required>
                    </div>

                    <div class="form-group">
                        <label>Section</label>
                        <input type="text" name="section" value="{{ student['section'] }}" required>
                    </div>

                    <div class="form-group">
                        <label>Roll Number (Optional)</label>
                        <input type="text" name="roll_number" placeholder="e.g. 200101XXX" value="{{ student['roll_number'] if student['roll_number'] else '' }}">
                    </div>

                    <div class="form-group">
                        <label>Branch (Optional)</label>
                        <input type="text" name="branch" placeholder="e.g. Computer Science" value="{{ student['branch'] if student['branch'] else '' }}">
                    </div>

                </div>
                
                <div style="margin-top: 20px; text-align: right;">
                    <button type="submit" class="primary-btn">Save Changes</button>
                </div>
            </form>
        </div>

    </div>
</div>
</body>
</html>
